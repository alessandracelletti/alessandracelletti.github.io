<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#0b2f66}
.header{background:linear-gradient(135deg,#022f73 0%,#024ba9 55%,#0466c8 100%);color:#fff;padding:30px 40px}
.header a{display:inline-block;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:6px 11px;background:rgba(255,255,255,.12);margin-bottom:14px}
.header h1{margin:0;font-size:clamp(2rem,4vw,3.2rem)}
.container{width:min(1120px,calc(100% - 40px));margin:24px auto}
.card{background:#fff;border:1px solid #c8dcf6;border-radius:18px;padding:28px;box-shadow:0 8px 24px rgba(2,75,169,.12)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:24px}
.book{text-align:center}
.book img{max-width:100%;height:260px;object-fit:contain;border:1px solid #d5e3f7;border-radius:10px;background:white;padding:6px}
.caption{margin-top:8px;font-size:.95rem;color:#024ba9;font-weight:700}
.footer{text-align:center;padding:20px;color:#4a6ea8;font-size:13px}
@media(max-width:700px){.header{padding:24px 20px}.container{width:calc(100% - 24px)}}

.grid{
display:grid !important;
grid-template-columns:repeat(5,1fr) !important;
gap:22px !important;
}
@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr) !important;
}
}

</style>
</head>
